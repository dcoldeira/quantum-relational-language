services:
  qai:
    build: .
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - bell-data:/data
    environment:
      - BELL_DB_PATH=/data/bell.db
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  bell-data:
  caddy-data:
  caddy-config:
